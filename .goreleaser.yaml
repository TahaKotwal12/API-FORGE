version: 2

project_name: forge

before:
  hooks:
    - go mod tidy

builds:
  - id: forge
    dir: apps/cli
    main: .
    binary: forge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}

archives:
  - id: forge
    builds:
      - forge
    name_template: "forge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "forge_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: apiforge
    name: forge
  name_template: "{{ .Version }}"
  draft: false
  prerelease: auto

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

nightly:
  tag_name: cli-nightly
  publish_release: true
  keep_single_release: true
