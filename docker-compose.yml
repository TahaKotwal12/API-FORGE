services:
  postgres:
    image: postgres:16.6-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apiforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apiforge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apiforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-apiforge}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - '4222:4222'
    volumes:
      - nats_data:/data
    command: ['-js', '-sd', '/data']
    healthcheck:
      test: ['CMD', 'nats-server', '--help']
      interval: 10s
      timeout: 5s
      retries: 5

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.40.0
    restart: unless-stopped
    ports:
      - '3592:3592'
      - '3593:3593'
    volumes:
      - ./cerbos/policies:/policies:ro
      - ./cerbos/conf.yaml:/conf.yaml:ro
    command: server --config=/conf.yaml
    healthcheck:
      test: ['CMD', '/cerbos', 'healthcheck', '--insecure']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Full stack profile (profile: full) ───────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    profiles: ['full']
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-apiforge}:${POSTGRES_PASSWORD:-apiforge_secret}@postgres:5432/${POSTGRES_DB:-apiforge}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CERBOS_URL: http://cerbos:3593
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cerbos:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:4000/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    profiles: ['full']
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      BACKEND_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nats_data:
