name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests with coverage
        run: pnpm --filter @apiforge/backend test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage/

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apiforge
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: apiforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://apiforge:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/apiforge_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Prisma migrations
        run: pnpm --filter @apiforge/db db:migrate:deploy
      - name: Run backend E2E tests
        run: pnpm --filter @apiforge/backend test:e2e

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-e2e]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apiforge
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: apiforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://apiforge:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/apiforge_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @apiforge/web exec playwright install --with-deps chromium
      - name: Run Prisma migrations + seed
        run: |
          pnpm --filter @apiforge/db db:migrate:deploy
          pnpm --filter @apiforge/db db:seed
      - name: Start backend
        run: pnpm --filter @apiforge/backend dev &
        env:
          PORT: 4000
      - name: Build and start web
        run: |
          pnpm --filter @apiforge/web build
          pnpm --filter @apiforge/web start &
      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/health/live http://localhost:3000 --timeout 60000
      - name: Run Playwright smoke test
        run: pnpm --filter @apiforge/web test:e2e
        env:
          BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
