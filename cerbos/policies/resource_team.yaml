---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "team"
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      roles:
        - owner

    - actions: ["create", "read", "update", "delete", "manage_members"]
      effect: EFFECT_ALLOW
      roles:
        - admin

    - actions: ["read"]
      effect: EFFECT_ALLOW
      roles:
        - editor
        - viewer
        - guest
